# Sudx MCP Backend — Nginx Reverse Proxy Configuration
# Place in: /etc/nginx/sites-available/sudx-backend
# Enable: ln -s /etc/nginx/sites-available/sudx-backend /etc/nginx/sites-enabled/

# NOTE: limit_req_zone belongs in http{} context (nginx.conf), not inside server{}.
# If using 'include' from nginx.conf's http{} block, this placement is correct.
# If copy-pasting this file directly, move the line below into your nginx.conf http{} block.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name rtnc.sudx.de;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rtnc.sudx.de;

    # Let's Encrypt certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/rtnc.sudx.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rtnc.sudx.de/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Health endpoint (no auth, no rate limit)
    location = /health {
        proxy_pass http://127.0.0.1:8420;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE event stream — special config for long-lived connections
    location /api/v1/mcp/events/stream {
        proxy_pass http://127.0.0.1:8420;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        # Critical for SSE: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;  # 1 hour max for SSE
        proxy_send_timeout 3600s;

        # Disable response buffering at nginx level
        add_header X-Accel-Buffering no;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:8420;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Block direct access to backend port from outside
    # (ufw should also block 8420, this is defense in depth)
    location / {
        return 404;
    }
}
